# New-API Docker Compose Configuration
# 
# Quick Start:
#   1. docker compose up -d
#   2. Access at http://localhost:2000

services:
  # 1. PostgreSQL 17 database service
  postgres:
    image: ${IMAGE_REGISTRY:-}postgres:17-alpine
    container_name: new-api-postgres
    restart: always
    environment:
      POSTGRES_DB: new-api
      POSTGRES_USER: new-api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U new-api"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis cache service
  redis:
    image: ${IMAGE_REGISTRY:-}redis:7-alpine
    container_name: new-api-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis-data:/data
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. New-API application service pulled from a published image
  new-api:
    image: ${APP_IMAGE}
    container_name: new-api-app
    restart: always
    ports:
      - "2000:3000"
    environment:
      - SQL_DSN=postgresql://new-api:${POSTGRES_PASSWORD}@postgres:5432/new-api?sslmode=disable
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SESSION_SECRET=${SESSION_SECRET}
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1
      - LOG_FORMAT=${LOG_FORMAT:-json}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./new-api-logs:/logs
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:2000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  new-api-network:
    driver: bridge
