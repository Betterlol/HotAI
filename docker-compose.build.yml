# Build and push the full production image.
#
# Usage:
#   APP_IMAGE=registry.example.com/namespace/new-api:tag docker compose -f docker-compose.build.yml build
#   APP_IMAGE=registry.example.com/namespace/new-api:tag docker compose -f docker-compose.build.yml push

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_REGISTRY: ${IMAGE_REGISTRY:-}
    image: ${APP_IMAGE}
