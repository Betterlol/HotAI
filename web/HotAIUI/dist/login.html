<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - HotAI</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-left">
        <div class="carousel">
            <div class="slide">
                <div class="slide-content"><h2 style="color:var(--c-primary);">AI 算力聚合</h2>
                    <p style="font-weight:normal; font-size:14px; color:var(--c-text-secondary);">汇聚全球顶尖模型
                        API</p></div>
            </div>
            <div class="slide">
                <div class="slide-content"><h2 style="color:var(--c-primary);">极速稳定</h2>
                    <p style="font-weight:normal; font-size:14px; color:var(--c-text-secondary);">企业级高可用 API
                        服务</p></div>
            </div>
            <div class="slide">
                <div class="slide-content"><h2 style="color:var(--c-primary);">开发者友好</h2>
                    <p style="font-weight:normal; font-size:14px; color:var(--c-text-secondary);">智能运维与弹性计费</p>
                </div>
            </div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-card">
            <div class="auth-header"><h1>登录</h1>
                <p>欢迎回来，请登录您的账户</p></div>
            <form>
                <div class="form-group"><label>用户名或邮箱</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        <input type="text" placeholder="请输入您的用户名或邮箱地址"></div>
                </div>
                <div class="form-group"><label>密码</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                        <input type="password" placeholder="请输入您的密码" id="loginPassword">
                        <div class="eye-trigger" onclick="togglePasswordVisibility('loginPassword', this)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn-submit">继续</button>
                <a href="reset.html" class="forgot-pwd">忘记密码？</a>
                <div class="auth-footer">没有账户？ <a href="register.html">注册</a></div>
            </form>
        </div>
    </div>
</div>
<script>function togglePasswordVisibility(id, el) {
    const i = document.getElementById(id), s = el.querySelector('svg');
    if (i.type === "password") {
        i.type = "text";
        s.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
    } else {
        i.type = "password";
        s.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    }
}</script>
<!-- 引入 API 和认证脚本 -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
