<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title>模型广场</title>
    <!-- 引入同级的 CSS 文件夹下的样式文件 -->
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/model.css">
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">
            <img src="picture/logo.png" alt="图灵智算" style="width: 36px; height: 36px; object-fit: contain;">
            图灵智算</a>
        <div class="nav-links">
            <a href="index.html" data-i18n="nav.home">首页</a>
            <a href="console.html" data-i18n="nav.console">控制台</a>
            <a href="model.html" class="active" data-i18n="nav.models">模型广场</a>
            <a href="docs.html" data-i18n="nav.docs">文档</a>
            <a href="about.html" data-i18n="nav.about">关于</a>
        </div>
    </div>
    <div class="nav-right">
        <!-- 公告按钮 -->
        <button class="icon-btn" id="noticeBtn" title="公告">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notice-badge" id="noticeBadge" style="display: none;"></span>
        </button>
        
        <!-- 翻译/语言切换按钮 -->
        <div class="language-selector">
            <button class="icon-btn" id="languageBtn" title="语言">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </button>
            <div class="language-dropdown" id="languageDropdown">
                <div class="language-option" data-lang="zh">
                    <span data-i18n="lang.zh">中文</span>
                </div>
                <div class="language-option" data-lang="en">
                    <span data-i18n="lang.en">English</span>
                </div>
            </div>
        </div>
        
        <!-- 未登录时显示登录/注册按钮，已登录时显示用户菜单，由 auth.js 动态控制 -->
        <a href="login.html" class="btn-login" id="navLoginBtn" data-i18n="nav.login">登录</a>
        <a href="register.html" class="btn-signup" id="navSignupBtn" data-i18n="nav.signup">注册</a>
        
        <!-- 用户菜单（已登录时显示） -->
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger">
                <div class="user-avatar-top" id="navUserAvatar">U</div>
                <span id="navUsername">User</span>
            </div>
            <div class="user-dropdown" id="navUserDropdown">
                <a href="profile.html" class="user-dropdown-item" data-i18n="nav.profile">个人设置</a>
                <div class="user-dropdown-divider"></div>
                <button id="navLogoutBtn" class="user-dropdown-item" data-i18n="nav.logout">退出登录</button>
            </div>
        </div>
    </div>
</header>

<!-- 公告弹窗 -->
<div class="notice-modal" id="noticeModal" style="display: none;">
    <div class="notice-overlay" id="noticeOverlay"></div>
    <div class="notice-card">
        <div class="notice-header">
            <h3 data-i18n="notice.title">公告</h3>
            <button class="notice-close" id="noticeClose">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="notice-content" id="noticeContent">
            <div class="notice-loading" data-i18n="notice.loading">加载中...</div>
        </div>
    </div>
</div>

<div class="app-wrapper">
    <aside class="sidebar-filters">
        <div class="filter-header"><span class="filter-title" data-i18n="model.filter_title">筛选</span><span class="filter-reset" data-i18n="model.filter_reset">重置</span></div>
        <div class="filter-group">
            <div class="filter-group-title" data-i18n="model.filter_provider">供应商</div>
            <div class="filter-options">
                <button class="filter-opt-btn active" data-filter="vendor" data-value="all" data-i18n="model.filter_all_providers">全部供应商</button>
                <!-- 其他按钮动态生成 -->
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title" data-i18n="model.filter_group">可用令牌分组</div>
            <div class="filter-options">
                <button class="filter-opt-btn active" data-filter="group" data-value="all" data-i18n="model.filter_all_groups">全部分组</button>
                <!-- 其他按钮动态生成 -->
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title" data-i18n="model.filter_billing">计费类型</div>
            <div class="filter-options">
                <button class="filter-opt-btn active" data-filter="billing" data-value="all" data-i18n="model.filter_all_billing">全部类型</button>
                <button class="filter-opt-btn" data-filter="billing" data-value="0" data-i18n="model.filter_billing_quantity">按量计费</button>
                <button class="filter-opt-btn" data-filter="billing" data-value="1" data-i18n="model.filter_billing_per_call">按次计费</button>
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title" data-i18n="model.filter_tags">标签</div>
            <div class="filter-options">
                <button class="filter-opt-btn active" data-filter="tag" data-value="all" data-i18n="model.filter_all_tags">全部标签</button>
                <!-- 其他按钮动态生成 -->
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title" data-i18n="model.filter_endpoint">端点类型</div>
            <div class="filter-options">
                <button class="filter-opt-btn active" data-filter="endpoint" data-value="all" data-i18n="model.filter_all_endpoints">全部端点</button>
                <!-- 其他按钮动态生成 -->
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="search-bar-wrapper">
            <div class="search-input-area">
                <svg viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" data-i18n-placeholder="model.search_placeholder" placeholder="模糊搜索模型名称">
            </div>
            <div class="search-actions">
                <button class="search-btn-outline" id="copySelectedBtn" data-i18n="model.btn_copy">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    复制
                </button>

                <div class="switch-item"><span data-i18n="model.switch_price">充值价格显示</span>
                    <div class="switch active" id="switchPrice"></div>
                </div>

                <div class="currency-selector">
                    <button class="currency-toggle" id="currencyBtn"><span>USD</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                    <ul class="currency-dropdown" id="currencyDropdown">
                        <li data-value="USD">USD</li>
                        <li data-value="CNY">CNY</li>
                    </ul>
                </div>

                <div class="switch-item"><span data-i18n="model.switch_rate">倍率</span>
                    <div class="switch" id="switchRate"></div>
                </div>

                <button class="search-btn-outline" id="switchViewBtn">表格视图</button>
                <button class="search-btn-outline" id="switchUnitBtn" data-i18n="model.btn_unit_k">K</button>
            </div>
        </div>

        <div class="banner-card" id="bannerCard">
            <div class="banner-left">
                <div class="banner-title">
                    <span id="bannerVendorName">全部供应商</span>
                    <span id="bannerModelCount">共 0 个模型</span>
                </div>
                <div class="banner-desc" id="bannerDescription">查看所有可用的AI模型供应商，包括众多知名供应商的模型。</div>
            </div>
            <div class="banner-right" id="bannerLogos" style="display: none;">
                <!-- 供应商 logo 轮播区域 -->
            </div>
        </div>

        <!-- 卡片视图容器 -->
        <div id="cardViewContainer" class="view-container">
            <div class="card-grid" id="cardGrid"></div>
        </div>

        <!-- 列表视图容器 -->
        <div id="tableViewContainer" class="view-container hidden">
            <div class="model-table-wrapper">
                <table class="model-table">
                    <colgroup>
                        <col style="width: 40px;">
                        <col style="width: 20%;">
                        <col style="width: 11%;">
                        <col style="width: 7%;">
                        <col style="width: 7%;">
                        <col style="width: 11%;">
                        <col style="width: 11%;">
                        <col style="width: 16.5%;">
                        <col style="width: 16.5%;">
                    </colgroup>
                    <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" id="selectAllCheckbox"></th>
                        <th data-i18n="model.table_name">模型名称</th>
                        <th data-i18n="model.table_provider">供应商</th>
                        <th data-i18n="model.table_desc">描述</th>
                        <th data-i18n="model.table_tags">标签</th>
                        <th data-i18n="model.table_billing">计费类型</th>
                        <th data-i18n="model.table_endpoint">可用端点类型</th>
                        <th data-i18n="model.table_rate">倍率</th>
                        <th data-i18n="model.table_price">模型价格</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- 模型详情抽屉 -->
<div class="model-drawer-overlay" id="modelDrawerOverlay" style="display: none;"></div>
<div class="model-drawer" id="modelDrawer" style="display: none;">
    <div class="drawer-header">
        <div class="drawer-title" id="drawerTitle">
            <div class="drawer-model-icon" id="drawerModelIcon"></div>
            <div class="drawer-model-name" id="drawerModelName">模型名称</div>
        </div>
        <button class="drawer-close-btn" id="drawerCloseBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <div class="drawer-content" id="drawerContent">
        <!-- 内容将由 JS 动态填充 -->
    </div>
</div>

<!-- 引入 JavaScript -->
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/providers.js"></script>
<script src="js/model.js"></script>
</body>
</html>
