<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title>模型广场</title>
    <!-- 引入同级的 CSS 文件夹下的样式文件 -->
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/model.css">
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">
            <img src="picture/logo.png" alt="图灵智算" style="width: 36px; height: 36px; object-fit: contain;">
            图灵智算</a>
        <div class="nav-links"><a href="index.html">首页</a><a href="console.html">控制台</a><a href="model.html" class="active">模型广场</a><a href="docs.html">文档</a><a href="#">关于</a></div>
    </div>
    <div class="nav-right">
        <button class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </button>
        <button class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        </button>
        <button class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
        </button>
        <a href="login.html" class="btn-login">登录</a>
        <a href="register.html" class="btn-signup">注册</a>
    </div>
</header>

<div class="app-wrapper">
    <aside class="sidebar-filters">
        <div class="filter-header"><span class="filter-title">筛选</span><span class="filter-reset">重置</span></div>
        <div class="filter-group">
            <div class="filter-group-title">供应商</div>
            <div class="filter-options">
                <button class="filter-opt-btn active">全部供应商</button>
                <button class="filter-opt-btn">DeepSeek</button>
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title">可用令牌分组</div>
            <div class="filter-options">
                <button class="filter-opt-btn active">全部分组</button>
                <button class="filter-opt-btn">default</button>
                <button class="filter-opt-btn">vip</button>
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title">计费类型</div>
            <div class="filter-options">
                <button class="filter-opt-btn active">全部类型</button>
                <button class="filter-opt-btn">按量计费</button>
                <button class="filter-opt-btn">按次计费</button>
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title">标签</div>
            <div class="filter-options">
                <button class="filter-opt-btn active">全部标签</button>
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-group-title">端点类型</div>
            <div class="filter-options">
                <button class="filter-opt-btn active">全部端点</button>
                <button class="filter-opt-btn">openai</button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="search-bar-wrapper">
            <div class="search-input-area">
                <svg viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" placeholder="模糊搜索模型名称">
            </div>
            <div class="search-actions">
                <button class="search-btn-outline" id="copySelectedBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    复制
                </button>

                <div class="switch-item">充值价格显示
                    <div class="switch active" id="switchPrice"></div>
                </div>

                <div class="currency-selector">
                    <button class="currency-toggle" id="currencyBtn"><span>USD</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                    <ul class="currency-dropdown" id="currencyDropdown">
                        <li data-value="USD">USD</li>
                        <li data-value="CNY">CNY</li>
                    </ul>
                </div>

                <div class="switch-item">倍率
                    <div class="switch" id="switchRate"></div>
                </div>

                <button class="search-btn-outline" id="switchViewBtn">表格视图</button>
                <button class="search-btn-outline" id="switchUnitBtn">K</button>
            </div>
        </div>

        <div class="banner-card">
            <div class="banner-left">
                <div class="banner-title">全部供应商 <span>共 2 个模型</span></div>
                <div class="banner-desc">查看所有可用的AI模型供应商，包括众多知名供应商的模型。</div>
            </div>
        </div>

        <!-- 卡片视图容器 -->
        <div id="cardViewContainer" class="view-container">
            <div class="card-grid" id="cardGrid"></div>
        </div>

        <!-- 列表视图容器 -->
        <div id="tableViewContainer" class="view-container hidden">
            <div class="model-table-wrapper">
                <table class="model-table">
                    <colgroup>
                        <col style="width: 40px;">
                        <col style="width: 20%;">
                        <col style="width: 11%;">
                        <col style="width: 7%;">
                        <col style="width: 7%;">
                        <col style="width: 11%;">
                        <col style="width: 11%;">
                        <col style="width: 16.5%;">
                        <col style="width: 16.5%;">
                    </colgroup>
                    <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" id="selectAllCheckbox"></th>
                        <th>模型名称</th>
                        <th>供应商</th>
                        <th>描述</th>
                        <th>标签</th>
                        <th>计费类型</th>
                        <th>可用端点类型</th>
                        <th>倍率</th>
                        <th>模型价格</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- 引入 JavaScript -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/model.js"></script>
</body>
</html>
