<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title>控制台 - 个人设置</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/console-shared.css">
    <style>
        .overview-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px; padding: 32px; color: #fff; margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px;
        }
        .overview-left { display: flex; align-items: center; gap: 20px; }
        .avatar-large {
            width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700;
        }
        .overview-info h2 { font-size: 22px; margin-bottom: 6px; }
        .overview-info p { font-size: 14px; opacity: 0.9; }
        .overview-right { display: flex; gap: 32px; flex-wrap: wrap; }
        .overview-stat { display: flex; flex-direction: column; gap: 4px; }
        .overview-stat .label { font-size: 13px; opacity: 0.8; }
        .overview-stat .val { font-size: 20px; font-weight: 700; }
        .settings-section { margin-bottom: 24px; }
    </style>
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo"><img src="picture/logo.png" alt="图灵智算" style="width:36px;height:36px;object-fit:contain;">图灵智算</a>
        <div class="nav-links"><a href="index.html">首页</a><a href="console.html" class="active">控制台</a><a href="model.html">模型广场</a><a href="docs.html">文档</a><a href="about.html">关于</a></div>
    </div>
    <div class="nav-right">
        <button class="icon-btn" id="noticeBtn" title="公告"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
        <div class="language-selector"><button class="icon-btn" id="languageBtn" title="语言"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button><div class="language-dropdown" id="languageDropdown"><div class="language-option" data-lang="zh"><span>中文</span></div><div class="language-option" data-lang="en"><span>English</span></div></div></div>
        <a href="login.html" class="btn-login" id="navLoginBtn">登录</a>
        <a href="register.html" class="btn-signup" id="navSignupBtn">注册</a>
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger"><div class="user-avatar-top" id="navUserAvatar">U</div><span id="navUsername">User</span></div>
            <div class="user-dropdown" id="navUserDropdown">
                <a href="profile.html" class="user-dropdown-item">个人设置</a>
                <div class="user-dropdown-divider"></div>
                <button id="navLogoutBtn" class="user-dropdown-item">退出登录</button>
            </div>
        </div>
    </div>
</header>
<div class="notice-modal" id="noticeModal" style="display:none;"><div class="notice-overlay" id="noticeOverlay"></div><div class="notice-card"><div class="notice-header"><h3>公告</h3><button class="notice-close" id="noticeClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><div class="notice-content" id="noticeContent"><div class="notice-loading">加载中...</div></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-header">
            <div class="page-title">个人设置</div>
        </div>

        <!-- 用户概览卡片 -->
        <div class="overview-card">
            <div class="overview-left">
                <div class="avatar-large" id="avatarLarge">U</div>
                <div class="overview-info">
                    <h2><span id="usernameDisplay">加载中...</span></h2>
                    <p id="emailDisplay">加载中...</p>
                </div>
            </div>
            <div class="overview-right">
                <div class="overview-stat"><span class="label">账户余额</span><span class="val" id="balanceDisplay">$0.00</span></div>
                <div class="overview-stat"><span class="label">已用额度</span><span class="val" id="usedDisplay">$0.00</span></div>
                <div class="overview-stat"><span class="label">注册时间</span><span class="val" id="registerDateDisplay">--</span></div>
            </div>
        </div>

        <!-- 个人资料编辑 -->
        <div class="settings-section">
            <div class="card">
                <div class="card-header"><div class="card-title">个人资料</div></div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">显示名称</label>
                        <input type="text" class="form-input" id="displayNameInput" placeholder="显示名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" id="usernameInput" placeholder="用户名" readonly>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="emailInput" placeholder="邮箱地址">
                </div>
                <div style="display:flex; justify-content:flex-end; margin-top:16px;">
                    <button class="btn btn-primary" onclick="updateProfile()">保存更改</button>
                </div>
            </div>
        </div>

        <!-- 修改密码 -->
        <div class="settings-section">
            <div class="card">
                <div class="card-header"><div class="card-title">修改密码</div></div>
                <div style="max-width:600px;">
                    <div class="form-group">
                        <label class="form-label">当前密码</label>
                        <input type="password" class="form-input" id="currentPassword" placeholder="请输入当前密码">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">新密码</label>
                            <input type="password" class="form-input" id="newPassword" placeholder="至少8位">
                        </div>
                        <div class="form-group">
                            <label class="form-label">确认新密码</label>
                            <input type="password" class="form-input" id="confirmPassword" placeholder="再次输入新密码">
                        </div>
                    </div>
                    <div style="display:flex; justify-content:flex-end; margin-top:16px;">
                        <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 兑换码充值 -->
        <div class="settings-section">
            <div class="card">
                <div class="card-header"><div class="card-title">兑换码充值</div></div>
                <div style="max-width:400px;">
                    <div class="form-group">
                        <label class="form-label">兑换码</label>
                        <input type="text" class="form-input" id="redeemCodeInput" placeholder="输入兑换码">
                    </div>
                    <button class="btn btn-primary" onclick="redeemCode()">兑换</button>
                </div>
            </div>
        </div>

        <!-- 签到日历 -->
        <div class="settings-section">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">每日签到</div>
                    <span class="badge badge-success" id="checkinBadge" style="display:none;">已签到</span>
                </div>
                <div class="card-body">
                    <div style="margin-bottom:16px;">
                        <span style="font-size:13px;color:var(--c-text-secondary);">连续签到：</span>
                        <span style="font-size:20px;font-weight:700;color:var(--c-primary);" id="checkinStreak">0</span>
                        <span style="font-size:13px;color:var(--c-text-secondary);margin-left:16px;">本月签到：</span>
                        <span style="font-size:20px;font-weight:700;" id="checkinMonth">0</span>
                    </div>
                    <button class="btn btn-primary" onclick="doCheckin()" id="checkinBtn">立即签到</button>
                    <div id="checkinCalendar" style="margin-top:20px;"></div>
                </div>
            </div>
        </div>

        <!-- Passkey 管理 -->
        <div class="settings-section">
            <div class="card">
                <div class="card-header"><div class="card-title">Passkey 通行密钥</div></div>
                <div class="card-body">
                    <p style="font-size:14px;color:var(--c-text-secondary);margin-bottom:16px;">
                        使用 Passkey 可以更快速、更安全地登录，无需记住密码。
                    </p>
                    <button class="btn btn-primary" onclick="addPasskey()">添加 Passkey</button>
                    <div id="passkeyList" style="margin-top:16px;"></div>
                </div>
            </div>
        </div>

        <!-- 双因素认证 -->
        <div class="settings-section">
            <div class="card">
                <div class="card-header"><div class="card-title">双因素认证 (2FA)</div></div>
                <div class="card-body">
                    <p style="font-size:14px;color:var(--c-text-secondary);margin-bottom:16px;">
                        启用双因素认证后，登录时需要输入动态验证码，增强账户安全。
                    </p>
                    <div id="twoFAStatus"></div>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- 2FA 设置对话框 -->
<div class="modal-overlay hidden" id="twoFAModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">启用双因素认证</div>
            <button class="modal-close" onclick="close2FAModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="modal-body">
            <p style="margin-bottom:16px;">使用认证应用扫描二维码（推荐 Google Authenticator）</p>
            <div style="text-align:center;margin-bottom:16px;" id="qrCode"></div>
            <div class="form-group">
                <label class="form-label">或手动输入密钥</label>
                <input type="text" class="form-input" id="totpSecret" readonly>
            </div>
            <div class="form-group">
                <label class="form-label">输入6位验证码 <span>*</span></label>
                <input type="text" class="form-input" id="totpCode" placeholder="000000" maxlength="6">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="close2FAModal()">取消</button>
            <button class="btn btn-primary" onclick="confirm2FA()">确认启用</button>
        </div>
    </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
