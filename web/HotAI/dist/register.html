<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title data-i18n="register.title">注册</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<!-- 顶部导航栏 -->
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">
            <img src="picture/logo.png" alt="图灵智算" style="width: 36px; height: 36px; object-fit: contain;">
            图灵智算</a>
        <div class="nav-links">
            <a href="index.html" data-i18n="nav.home">首页</a>
            <a href="console.html" data-i18n="nav.console">控制台</a>
            <a href="model.html" data-i18n="nav.models">模型广场</a>
            <a href="docs.html" data-i18n="nav.docs">文档</a>
            <a href="#" data-i18n="nav.about">关于</a>
        </div>
    </div>
    <div class="nav-right">
        <!-- 公告按钮 -->
        <button class="icon-btn" id="noticeBtn" title="公告">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notice-badge" id="noticeBadge" style="display: none;"></span>
        </button>
        
        <!-- 翻译/语言切换按钮 -->
        <div class="language-selector">
            <button class="icon-btn" id="languageBtn" title="语言">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </button>
            <div class="language-dropdown" id="languageDropdown">
                <div class="language-option" data-lang="zh">
                    <span data-i18n="lang.zh">中文</span>
                </div>
                <div class="language-option" data-lang="en">
                    <span data-i18n="lang.en">English</span>
                </div>
            </div>
        </div>
        
        <!-- 未登录时显示登录/注册按钮，已登录时显示用户菜单，由 auth.js 动态控制 -->
        <a href="login.html" class="btn-login" id="navLoginBtn" data-i18n="nav.login">登录</a>
        <a href="register.html" class="btn-signup" id="navSignupBtn" data-i18n="nav.signup">注册</a>
        
        <!-- 用户菜单（已登录时显示） -->
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger">
                <div class="user-avatar-top" id="navUserAvatar">U</div>
                <div class="user-info">
                    <span id="navUsername">User</span>
                    <span class="user-balance" id="navUserBalance">加载中...</span>
                </div>
            </div>
            <div class="user-dropdown" id="navUserDropdown">
                <a href="profile.html" class="user-dropdown-item" data-i18n="nav.profile">个人设置</a>
                <div class="user-dropdown-divider"></div>
                <button id="navLogoutBtn" class="user-dropdown-item" data-i18n="nav.logout">退出登录</button>
            </div>
        </div>
    </div>
</header>

<!-- 公告弹窗 -->
<div class="notice-modal" id="noticeModal" style="display: none;">
    <div class="notice-overlay" id="noticeOverlay"></div>
    <div class="notice-card">
        <div class="notice-header">
            <h3 data-i18n="notice.title">公告</h3>
            <button class="notice-close" id="noticeClose">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="notice-content" id="noticeContent">
            <div class="notice-loading" data-i18n="notice.loading">加载中...</div>
        </div>
    </div>
</div>

<div class="auth-wrapper">
    <div class="auth-left">
        <div class="carousel">
            <div class="slide">
                <div class="slide-content"><h2 data-i18n="register.carousel1_title">多模型支持</h2>
                    <p data-i18n="register.carousel1_desc">一键接入 ChatGPT、Claude、Gemini</p></div>
            </div>
            <div class="slide">
                <div class="slide-content"><h2 data-i18n="register.carousel2_title">API 智能路由</h2>
                    <p data-i18n="register.carousel2_desc">自动选择最优模型与通道</p></div>
            </div>
            <div class="slide">
                <div class="slide-content"><h2 data-i18n="register.carousel3_title">数据安全保障</h2>
                    <p data-i18n="register.carousel3_desc">企业级加密与本地化部署</p></div>
            </div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-card">
            <div class="auth-header"><h1 data-i18n="register.title">注册</h1>
                <p data-i18n="register.desc">加入图灵智算，开启 AI 开发之旅</p></div>
            <form>
                <div class="form-group"><label data-i18n="register.username">用户名</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        <input type="text" data-i18n-placeholder="register.username_placeholder" placeholder="请输入用户名"></div>
                </div>
                <div class="form-group"><label data-i18n="register.password">密码</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                        <input type="password" data-i18n-placeholder="register.password_placeholder" placeholder="输入密码，最短 8 位，最长 20 位" id="regPwd1">
                        <div class="eye-trigger" onclick="togglePasswordVisibility('regPwd1', this)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="form-group"><label data-i18n="register.confirm_password">确认密码</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                        <input type="password" data-i18n-placeholder="register.confirm_password_placeholder" placeholder="确认密码" id="regPwd2">
                        <div class="eye-trigger" onclick="togglePasswordVisibility('regPwd2', this)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn-submit" data-i18n="register.submit">注册</button>
                <div class="auth-footer"><span data-i18n="register.has_account">已有账户？</span> <a href="login.html" data-i18n="register.login_link">登录</a></div>
            </form>
        </div>
    </div>
</div>
<script>function togglePasswordVisibility(id, el) {
    const i = document.getElementById(id), s = el.querySelector('svg');
    if (i.type === "password") {
        i.type = "text";
        s.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
    } else {
        i.type = "password";
        s.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    }
}</script>
<!-- 引入 JavaScript -->
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/register.js"></script>
</body>
</html>
