<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

<body>

    </div>
    <div class="nav-right">
        <button class="icon-btn" id="noticeBtn" title="公告"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
        <div class="language-selector"><button class="icon-btn" id="languageBtn" title="语言"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button><div class="language-dropdown" id="languageDropdown"><div class="language-option" data-lang="zh"><span>中文</span></div><div class="language-option" data-lang="en"><span>English</span></div></div></div>
        <a href="login.html" class="btn-login" id="navLoginBtn">登录</a>
        <a href="register.html" class="btn-signup" id="navSignupBtn">注册</a>
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger"><div class="user-avatar-top" id="navUserAvatar">U</div><span id="navUsername">User</span></div>
            <div class="user-dropdown" id="navUserDropdown">
                <a href="profile.html" class="user-dropdown-item">个人设置</a>
                <div class="user-dropdown-divider"></div>

            </div>
        </div>

</header>
<div class="notice-modal" id="noticeModal" style="display:none;">
    <div class="notice-overlay" id="noticeOverlay"></div>
    <div class="notice-card">
        <div class="notice-header"><h3>公告</h3><button class="notice-close" id="noticeClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
        <div class="notice-content" id="noticeContent"><div class="notice-loading">加载中...</div></div>
    </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<!-- 创建/编辑订阅套餐模态框 -->
<div class="modal-overlay hidden" id="planModal">
    <div class="modal" style="max-width:660px;">
        <div class="modal-header">
            <div class="modal-title" id="planModalTitle">创建订阅套餐</div>
            <button class="modal-close" onclick="closePlanModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="modal-body" style="max-height:70vh;overflow-y:auto;">
            <input type="hidden" id="planId">
            <!-- 基础信息 -->
            <div style="background:#eff6ff;border:1px solid var(--c-border);border-radius:12px;padding:20px;margin-bottom:16px;">
                <div style="font-weight:600;font-size:14px;color:var(--c-text-main);margin-bottom:14px;">基础信息</div>
                <div class="form-row">
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">套餐标题 <span>*</span></label>
                        <input type="text" class="form-input" id="planTitle" placeholder="如：基础版">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">副标题</label>
                        <input type="text" class="form-input" id="planSubtitle" placeholder="可选描述">
                    </div>
                </div>
                <div class="form-row" style="margin-top:12px;">
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">价格 (USD) <span>*</span></label>
                        <input type="number" class="form-input" id="planPrice" placeholder="0.00" step="0.01" min="0">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">优先级 (sort_order)</label>
                        <input type="number" class="form-input" id="planSortOrder" placeholder="0" value="0">
                    </div>
                </div>
            </div>
            <!-- 有效期与重置 -->
            <div style="background:#eff6ff;border:1px solid var(--c-border);border-radius:12px;padding:20px;margin-bottom:16px;">
                <div style="font-weight:600;font-size:14px;color:var(--c-text-main);margin-bottom:14px;">有效期与额度重置</div>
                <div class="form-row">
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">有效期单位 <span>*</span></label>
                        <select class="form-select" id="planDurationUnit">
                            <option value="month">月</option>
                            <option value="year">年</option>
                            <option value="day">天</option>
                            <option value="hour">小时</option>
                            <option value="custom">自定义(秒)</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">有效期数值 <span>*</span></label>
                        <input type="number" class="form-input" id="planDurationValue" placeholder="1" value="1" min="1">
                    </div>
                </div>
                <div class="form-group" style="margin-top:12px;margin-bottom:0;" id="planCustomSecondsGroup" style="display:none;">
                    <label class="form-label">自定义秒数</label>
                    <input type="number" class="form-input" id="planCustomSeconds" placeholder="0" min="0">
                </div>
                <div class="form-row" style="margin-top:12px;">
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">额度重置周期</label>
                        <select class="form-select" id="planResetPeriod">
                            <option value="never">从不重置</option>
                            <option value="daily">每天</option>
                            <option value="weekly">每周</option>
                            <option value="monthly">每月</option>
                            <option value="custom">自定义(秒)</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;" id="planResetCustomGroup">
                        <label class="form-label">重置自定义秒数</label>
                        <input type="number" class="form-input" id="planResetCustomSeconds" placeholder="0" min="0">
                    </div>
                </div>
            </div>
            <!-- 额度与限制 -->
            <div style="background:#eff6ff;border:1px solid var(--c-border);border-radius:12px;padding:20px;margin-bottom:16px;">
                <div style="font-weight:600;font-size:14px;color:var(--c-text-main);margin-bottom:14px;">额度与限制</div>
                <div class="form-row">
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">总额度 (0=不限)</label>
                        <input type="number" class="form-input" id="planTotalAmount" placeholder="0" value="0" min="0">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">购买上限 (0=不限)</label>
                        <input type="number" class="form-input" id="planMaxPurchase" placeholder="0" value="0" min="0">
                    </div>
                </div>
                <div class="form-row" style="margin-top:12px;">
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">升级分组</label>
                        <input type="text" class="form-input" id="planUpgradeGroup" placeholder="留空不升级">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">降级分组</label>
                        <input type="text" class="form-input" id="planDowngradeGroup" placeholder="留空不降级">
                    </div>
                </div>
            </div>
            <!-- 支付渠道 -->
            <div style="background:#eff6ff;border:1px solid var(--c-border);border-radius:12px;padding:20px;margin-bottom:16px;">
                <div style="font-weight:600;font-size:14px;color:var(--c-text-main);margin-bottom:14px;">支付渠道配置</div>
                <div class="form-group" style="margin-bottom:10px;">
                    <label class="form-label">Stripe Price ID</label>
                    <input type="text" class="form-input" id="planStripeId" placeholder="price_xxx">
                </div>
                <div class="form-group" style="margin-bottom:10px;">
                    <label class="form-label">Creem Product ID</label>
                    <input type="text" class="form-input" id="planCreemId" placeholder="creem_xxx">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">Waffo Pancake Product ID</label>
                    <input type="text" class="form-input" id="planWaffoId" placeholder="waffo_xxx">
                </div>
            </div>
            <!-- 状态 -->
            <div class="form-group" style="margin:0;">
                <label class="form-switch">
                    <input type="checkbox" class="switch-input" id="planEnabled" checked>
                    <span class="switch-track"></span>
                    <span class="switch-label">启用套餐</span>
                </label>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closePlanModal()">取消</button>
            <button class="btn btn-primary" onclick="savePlan()">保存</button>
        </div>
    </div>
</div>

<div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">

        <!-- 上半部分标题 -->
        <div class="page-header">
            <div class="page-title">订阅管理</div>
            <div class="page-actions">
                <button class="btn btn-primary" onclick="openCreatePlanModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新建套餐
                </button>
            </div>
        </div>

        <!-- 上半部分卡片：订阅套餐列表 -->
        <div class="table-card">
            <div class="table-toolbar">
                <div class="table-toolbar-left">
                    <h3 style="font-size:15px;font-weight:600;margin:0;color:var(--c-text-main);">订阅套餐列表</h3>
                </div>
                <div class="table-toolbar-right" style="display:flex;align-items:center;gap:8px;">
                    <div class="search-input-wrap">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
                        <input type="text" class="search-input" id="planSearch" placeholder="搜索套餐名称...">
                    </div>
                    <select class="form-select" id="planSortField" style="width:120px;border-radius:999px;padding:7px 28px 7px 12px;font-size:13px;">
                        <option value="id">ID排序</option>
                        <option value="price">价格排序</option>
                        <option value="sort_order">优先级排序</option>
                    </select>
                    <button class="btn btn-secondary" onclick="togglePlanSortOrder()" id="planSortOrderBtn" title="切换排序">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" id="planSortIcon">
                            <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
                        </svg>
                    </button>
                    <button class="btn btn-secondary" onclick="loadPlans()">刷新</button>
                </div>
            </div>
            <div class="table-wrap" style="overflow-x:auto;">
                <table style="white-space:nowrap;">
                    <thead>
                        <tr>
                            <th style="text-align:center;">ID</th>
                            <th style="text-align:center;">套餐</th>
                            <th style="text-align:center;">价格</th>
                            <th style="text-align:center;">购买上限</th>
                            <th style="text-align:center;">优先级</th>
                            <th style="text-align:center;">有效期</th>
                            <th style="text-align:center;">重置</th>
                            <th style="text-align:center;">状态</th>
                            <th style="text-align:center;">支付渠道</th>
                            <th style="text-align:center;">总额度</th>
                            <th style="text-align:center;">升级分组</th>
                            <th style="text-align:center;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="planTableBody">
                        <tr><td colspan="12"><div class="loading-overlay"><div class="loading-spinner"></div></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 浅灰色分割线 -->
        <div style="height:1px;background:var(--c-border);margin:4px 0;"></div>

        <!-- 下半部分标题（容器外） -->
        <div class="page-header" style="margin-top:4px;">
            <div class="page-title" style="font-size:18px;">订阅用户列表</div>
        </div>

        <!-- 下半部分卡片：订阅用户列表 -->
        <div class="table-card">
            <div class="table-toolbar">
                <div class="table-toolbar-left" style="flex:1;">
                    <div class="search-input-wrap">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
                        <input type="text" class="search-input" id="userSearch" placeholder="搜索用户...">
                    </div>
                    <select class="form-select" id="userSortField" style="width:120px;border-radius:999px;padding:7px 28px 7px 12px;font-size:13px;">
                        <option value="id">ID排序</option>
                        <option value="username">用户名排序</option>
                    </select>
                    <button class="btn btn-secondary" onclick="toggleUserSortOrder()" id="userSortOrderBtn" title="切换排序">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" id="userSortIcon">
                            <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
                        </svg>
                    </button>
                </div>
                <div class="table-toolbar-right">
                    <button class="btn btn-secondary" onclick="loadSubscriptionUsers()">刷新</button>
                </div>
            </div>
            <div class="table-wrap" style="overflow-x:auto;">
                <table style="white-space:nowrap;">
                    <thead>
                        <tr>
                            <th style="text-align:center;">用户ID</th>
                            <th style="text-align:center;">用户名</th>
                            <th style="text-align:center;">套餐</th>
                            <th style="text-align:center;">状态</th>
                            <th style="text-align:center;">开始时间</th>
                            <th style="text-align:center;">到期时间</th>
                            <th style="text-align:center;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="subscriptionUsersTableBody">
                        <tr><td colspan="7"><div class="loading-overlay"><div class="loading-spinner"></div></div></td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <span id="subscriptionUsersPageInfo">共 0 条</span>
                <div class="pagination-pages" id="subscriptionUsersPages"></div>
            </div>
        </div>

    </main>
</div>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/subscription.js"></script>
</body>
</html>
