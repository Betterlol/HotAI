<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title>密码重置</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<!-- 顶部导航栏 -->
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">
            <img src="picture/logo.png" alt="图灵智算" style="width: 36px; height: 36px; object-fit: contain;">
            图灵智算</a>
        <div class="nav-links"><a href="index.html">首页</a><a href="console.html">控制台</a><a href="model.html">模型广场</a><a href="docs.html">文档</a><a href="#">关于</a></div>
    </div>
    <div class="nav-right">
        <button class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </button>
        <button class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        </button>
        <button class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
        </button>
        <a href="login.html" class="btn-login">登录</a>
        <a href="register.html" class="btn-signup">注册</a>
    </div>
</header>

<div class="auth-wrapper">
    <!-- 左侧：轮播图区域 -->
    <div class="auth-left">
        <div class="carousel">
            <div class="slide">
                <div class="slide-content"><h2>安全可靠</h2>
                    <p>企业级数据保护与加密</p></div>
            </div>
            <div class="slide">
                <div class="slide-content"><h2>快速响应</h2>
                    <p>密码重置邮件秒级送达</p></div>
            </div>
            <div class="slide">
                <div class="slide-content"><h2>体验优化</h2>
                    <p>极简流程，快速恢复访问</p></div>
            </div>
        </div>
    </div>

    <!-- 右侧：固定宽度、居中显示的卡片 -->
    <div class="auth-right">
        <div class="auth-card">
            <div class="auth-header">
                <h1>密码重置</h1>
                <p>输入您的邮箱以重置密码</p>
            </div>
            <form>
                <div class="form-group">
                    <label>邮箱</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                        </svg>
                        <input type="email" placeholder="请输入您的邮箱地址">
                    </div>
                </div>
                <button type="button" class="btn-submit">提交</button>
                <div class="auth-footer">
                    想起来了？ <a href="login.html">登录</a>
                </div>
            </form>
        </div>
    </div>
</div>
<!-- 引入 API 和认证脚本 -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/reset.js"></script>
</body>
</html>
