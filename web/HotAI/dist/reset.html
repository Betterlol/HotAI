<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title data-i18n="reset.title">密码重置</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        /* 重置密码消息提示 */
        .reset-message {
            display: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .reset-message-success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }
        .reset-message-error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .reset-message-info {
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        /* 步骤标题 */
        .step-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--c-primary-light);
            color: var(--c-primary);
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* 邮箱显示 */
        .email-display {
            background: var(--c-input-bg);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--c-text-secondary);
            margin-bottom: 16px;
            word-break: break-all;
        }

        /* 发送按钮组 */
        .input-with-btn {
            display: flex;
            gap: 8px;
        }
        .input-with-btn .input-wrapper {
            flex: 1;
        }
        .btn-send-code {
            flex-shrink: 0;
            padding: 0 14px;
            height: 48px;
            border: 1px solid var(--c-primary);
            background: transparent;
            color: var(--c-primary);
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s;
        }
        .btn-send-code:hover:not(:disabled) {
            background: var(--c-primary);
            color: #fff;
        }
        .btn-send-code:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* 成功面板 */
        .success-panel {
            text-align: center;
            padding: 8px 0;
        }
        .success-icon {
            width: 56px;
            height: 56px;
            background: #ecfdf5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .success-panel h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--c-text-main);
            margin-bottom: 8px;
        }
        .success-panel p {
            font-size: 14px;
            color: var(--c-text-secondary);
            margin-bottom: 20px;
        }
        .password-box {
            background: var(--c-input-bg);
            border: 1px dashed #d1d5db;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .password-box-value {
            font-family: monospace;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--c-text-main);
            word-break: break-all;
            flex: 1;
        }
        .btn-copy {
            flex-shrink: 0;
            padding: 6px 14px;
            border: 1px solid var(--c-primary);
            background: transparent;
            color: var(--c-primary);
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }
        .btn-copy:hover {
            background: var(--c-primary);
            color: #fff;
        }
        .hint-text {
            font-size: 12px;
            color: #9CA3AF;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<!-- 顶部导航栏 -->
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">
            <img src="picture/logo.png" alt="图灵智算" style="width: 36px; height: 36px; object-fit: contain;">
            图灵智算</a>
        <div class="nav-links">
            <a href="index.html" data-i18n="nav.home">首页</a>
            <a href="console.html" data-i18n="nav.console">控制台</a>
            <a href="model.html" data-i18n="nav.models">模型广场</a>
            <a href="docs.html" data-i18n="nav.docs">文档</a>
            <a href="about.html" data-i18n="nav.about">关于</a>
        </div>
    </div>
    <div class="nav-right">
        <!-- 公告按钮 -->
        <button class="icon-btn" id="noticeBtn" title="公告">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notice-badge" id="noticeBadge" style="display: none;"></span>
        </button>
        
        <!-- 翻译/语言切换按钮 -->
        <div class="language-selector">
            <button class="icon-btn" id="languageBtn" title="语言">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </button>
            <div class="language-dropdown" id="languageDropdown">
                <div class="language-option" data-lang="zh">
                    <span data-i18n="lang.zh">中文</span>
                </div>
                <div class="language-option" data-lang="en">
                    <span data-i18n="lang.en">English</span>
                </div>
            </div>
        </div>
        
        <a href="login.html" class="btn-login" id="navLoginBtn" data-i18n="nav.login">登录</a>
        <a href="register.html" class="btn-signup" id="navSignupBtn" data-i18n="nav.signup">注册</a>
        
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger">
                <div class="user-avatar-top" id="navUserAvatar">U</div>
                <div class="user-info">
                    <span id="navUsername">User</span>
                    <span class="user-balance" id="navUserBalance">加载中...</span>
                </div>
            </div>
            <div class="user-dropdown" id="navUserDropdown">
                <a href="profile.html" class="user-dropdown-item" data-i18n="nav.profile">个人设置</a>
                <div class="user-dropdown-divider"></div>
                <button id="navLogoutBtn" class="user-dropdown-item" data-i18n="nav.logout">退出登录</button>
            </div>
        </div>
    </div>
</header>

<!-- 公告弹窗 -->
<div class="notice-modal" id="noticeModal" style="display: none;">
    <div class="notice-overlay" id="noticeOverlay"></div>
    <div class="notice-card">
        <div class="notice-header">
            <h3 data-i18n="notice.title">公告</h3>
            <button class="notice-close" id="noticeClose">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="notice-content" id="noticeContent">
            <div class="notice-loading" data-i18n="notice.loading">加载中...</div>
        </div>
    </div>
</div>

<div class="auth-wrapper">
    <!-- 左侧：轮播图区域 -->
    <div class="auth-left">
        <div class="carousel">
            <div class="slide">
                <div class="slide-content"><h2 data-i18n="reset.carousel1_title">安全可靠</h2>
                    <p data-i18n="reset.carousel1_desc">企业级数据保护与加密</p></div>
            </div>
            <div class="slide">
                <div class="slide-content"><h2 data-i18n="reset.carousel2_title">快速响应</h2>
                    <p data-i18n="reset.carousel2_desc">密码重置邮件秒级送达</p></div>
            </div>
            <div class="slide">
                <div class="slide-content"><h2 data-i18n="reset.carousel3_title">体验优化</h2>
                    <p data-i18n="reset.carousel3_desc">极简流程，快速恢复访问</p></div>
            </div>
        </div>
    </div>

    <!-- 右侧：重置密码卡片 -->
    <div class="auth-right">
        <div class="auth-card">

            <!-- Step 1: 输入邮箱，发送重置邮件 -->
            <div id="resetStep1">
                <div class="auth-header">
                    <div class="step-badge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        </svg>
                        步骤 1 / 2
                    </div>
                    <h1 data-i18n="reset.title">密码重置</h1>
                    <p data-i18n="reset.step1_desc">我们将向您的邮箱发送重置令牌</p>
                </div>
                <form>
                    <div id="resetMessage1" class="reset-message"></div>
                    <div class="form-group">
                        <label data-i18n="reset.email">邮箱</label>
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24">
                                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                            </svg>
                            <input type="email" id="resetEmail" data-i18n-placeholder="reset.email_placeholder" placeholder="请输入您的邮箱地址">
                        </div>
                    </div>
                    <button type="button" id="resetSendCode" class="btn-submit" data-i18n="reset.send_code">发送重置邮件</button>
                    <div class="auth-footer">
                        <span data-i18n="reset.back_to_login">想起来了？</span> <a href="login.html" data-i18n="reset.login_link">登录</a>
                    </div>
                </form>
            </div>

            <!-- Step 2: 输入令牌，提交重置 -->
            <div id="resetStep2" style="display: none;">
                <div class="auth-header">
                    <div class="step-badge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        步骤 2 / 2
                    </div>
                    <h1 data-i18n="reset.step2_title">输入重置令牌</h1>
                    <p data-i18n="reset.step2_desc">从邮件中复制令牌并粘贴到下方</p>
                </div>
                <div class="email-display" id="resetEmailDisplay"></div>
                <form>
                    <div id="resetMessage2" class="reset-message"></div>
                    <div class="form-group">
                        <label data-i18n="reset.token">重置令牌</label>
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                            </svg>
                            <input type="text" id="resetToken" data-i18n-placeholder="reset.token_placeholder" placeholder="粘贴邮件中的令牌">
                        </div>
                    </div>
                    <button type="button" id="resetSubmit" class="btn-submit" data-i18n="reset.submit">重置密码</button>
                    <div class="auth-footer">
                        <a href="reset.html" data-i18n="reset.back_to_login" onclick="location.reload(); return false;">重新发送邮件</a>
                        &nbsp;·&nbsp;
                        <a href="login.html" data-i18n="reset.login_link">登录</a>
                    </div>
                </form>
            </div>

            <!-- 成功面板 -->
            <div id="resetSuccess" style="display: none;">
                <div class="success-panel">
                    <div class="success-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                    </div>
                    <h2 data-i18n="reset.success_title">密码重置成功</h2>
                    <p data-i18n="reset.success_desc">您的新密码已生成，请复制后登录</p>

                    <div class="password-box">
                        <span id="resetNewPassword" class="password-box-value" data-no-i18n></span>
                        <button type="button" id="resetCopyPassword" class="btn-copy" data-i18n="reset.copy_password">复制密码</button>
                    </div>
                    <p class="hint-text">请妥善保管此密码，登录后可在个人设置中修改</p>

                    <button type="button" id="resetGoLogin" class="btn-submit" data-i18n="reset.go_login">前往登录</button>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- 引入 JavaScript -->
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/reset.js"></script>
</body>
</html>
