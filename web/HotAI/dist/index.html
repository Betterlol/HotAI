<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title>图灵智算</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

<!-- 顶部导航栏 -->
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">
            <img src="picture/logo.png" alt="图灵智算" style="width: 36px; height: 36px; object-fit: contain;">
            图灵智算</a>
        <div class="nav-links">
            <a href="index.html" class="active" data-i18n="nav.home">首页</a>
            <a href="console.html" data-i18n="nav.console">控制台</a>
            <a href="model.html" data-i18n="nav.models">模型广场</a>
            <a href="docs.html" data-i18n="nav.docs">文档</a>
            <a href="about.html" data-i18n="nav.about">关于</a>
        </div>
    </div>
    <div class="nav-right">
        <!-- 公告按钮 -->
        <button class="icon-btn" id="noticeBtn" title="公告">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notice-badge" id="noticeBadge" style="display: none;"></span>
        </button>
        
        <!-- 翻译/语言切换按钮 -->
        <div class="language-selector">
            <button class="icon-btn" id="languageBtn" title="语言">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </button>
            <div class="language-dropdown" id="languageDropdown">
                <div class="language-option" data-lang="zh">
                    <span data-i18n="lang.zh">中文</span>
                </div>
                <div class="language-option" data-lang="en">
                    <span data-i18n="lang.en">English</span>
                </div>
            </div>
        </div>
        
        <!-- 未登录时显示登录/注册按钮，已登录时显示用户菜单，由 auth.js 动态控制 -->
        <a href="login.html" class="btn-login" id="navLoginBtn" data-i18n="nav.login">登录</a>
        <a href="register.html" class="btn-signup" id="navSignupBtn" data-i18n="nav.signup">注册</a>
        
        <!-- 用户菜单（已登录时显示） -->
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger">
                <div class="user-avatar-top" id="navUserAvatar">U</div>
                <div class="user-info">
                    <span id="navUsername">User</span>
                    <span class="user-balance" id="navUserBalance">加载中...</span>
                </div>
            </div>
            <div class="user-dropdown" id="navUserDropdown">
                <a href="profile.html" class="user-dropdown-item" data-i18n="nav.profile">个人设置</a>
                <div class="user-dropdown-divider"></div>
                <button id="navLogoutBtn" class="user-dropdown-item" data-i18n="nav.logout">退出登录</button>
            </div>
        </div>
    </div>
</header>

<!-- 公告弹窗 -->
<div class="notice-modal" id="noticeModal" style="display: none;">
    <div class="notice-overlay" id="noticeOverlay"></div>
    <div class="notice-card">
        <div class="notice-header">
            <h3 data-i18n="notice.title">公告</h3>
            <button class="notice-close" id="noticeClose">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="notice-content" id="noticeContent">
            <div class="notice-loading" data-i18n="notice.loading">加载中...</div>
        </div>
    </div>
</div>

<!-- 首页内容容器 -->
<div class="index-wrapper">
<!-- 左侧边栏 -->
<aside class="sidebar">
    <!-- 1. 顶部：模型配置面板 (60%) -->
    <div class="sidebar-config">
        <div class="section-label-with-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <span data-i18n="sidebar.model_config">模型配置</span>
        </div>
        
        <!-- 模型与分组 -->
        <div class="config-group">
            <!-- 模型选择 -->
            <div class="config-item">
                <label class="config-label" data-i18n="config.model">模型</label>
                <div class="model-selector-wrapper">
                    <button class="config-select" id="configModelSelector">
                        <span id="configSelectedModel" data-i18n="main.loading">加载中...</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                    <div class="config-dropdown" id="configModelDropdown" style="display: none;">
                        <div class="model-search-box">
                            <input type="text" class="model-search-input" id="configModelSearchInput" data-i18n-placeholder="main.search_model" placeholder="搜索模型...">
                        </div>
                        <div id="configModelList"></div>
                    </div>
                </div>
            </div>

            <!-- 分组选择 -->
            <div class="config-item">
                <label class="config-label" data-i18n="config.group">分组</label>
                <button class="config-select" id="configGroupSelector">
                    <span id="configSelectedGroup">default</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M6 9l6 6 6-6"/>
                    </svg>
                </button>
                <div class="config-dropdown" id="configGroupDropdown" style="display: none;">
                    <div id="configGroupList"></div>
                </div>
            </div>
        </div>

        <!-- 图片与流式输出 -->
        <div class="config-group">
            <!-- 图片上传 -->
            <div class="config-item">
                <label class="config-label" data-i18n="config.image">图片上传</label>
                <div class="config-switch-row">
                    <label class="config-switch">
                        <input type="checkbox" id="imageEnabled">
                        <span class="config-switch-slider"></span>
                    </label>
                    <span class="config-switch-label" data-i18n="config.enable">启用</span>
                </div>
                <div id="imageUrlContainer" style="display: none; margin-top: 8px;">
                    <input type="text" class="config-input" id="imageUrl" placeholder="图片 URL...">
                </div>
            </div>

            <!-- 流式输出 -->
            <div class="config-item">
                <label class="config-label" data-i18n="config.stream">流式输出</label>
                <div class="config-switch-row">
                    <label class="config-switch">
                        <input type="checkbox" id="streamEnabled" checked>
                        <span class="config-switch-slider"></span>
                    </label>
                    <span class="config-switch-label" data-i18n="config.enable">启用</span>
                </div>
            </div>
        </div>

        <!-- 参数配置 -->
        <div class="config-group">
            <!-- 温度 -->
            <div class="config-item">
                <label class="config-label">
                    <span data-i18n="config.temperature">温度</span>
                    <span class="config-value" id="temperatureValue">0.7</span>
                </label>
                <input type="range" class="config-slider" id="temperature" min="0" max="2" step="0.1" value="0.7">
            </div>

            <!-- Top P -->
            <div class="config-item">
                <label class="config-label">
                    <span data-i18n="config.top_p">Top P</span>
                    <span class="config-value" id="topPValue">1</span>
                </label>
                <input type="range" class="config-slider" id="topP" min="0" max="1" step="0.05" value="1">
            </div>

            <!-- 最大Token -->
            <div class="config-item">
                <label class="config-label" data-i18n="config.max_tokens">最大Token</label>
                <input type="number" class="config-input" id="maxTokens" min="1" max="32000" value="4096">
            </div>

            <!-- 频率惩罚 -->
            <div class="config-item">
                <label class="config-label">
                    <span data-i18n="config.frequency_penalty">频率惩罚</span>
                    <span class="config-value" id="frequencyPenaltyValue">0</span>
                </label>
                <input type="range" class="config-slider" id="frequencyPenalty" min="-2" max="2" step="0.1" value="0">
            </div>

            <!-- 存在惩罚 -->
            <div class="config-item">
                <label class="config-label">
                    <span data-i18n="config.presence_penalty">存在惩罚</span>
                    <span class="config-value" id="presencePenaltyValue">0</span>
                </label>
                <input type="range" class="config-slider" id="presencePenalty" min="-2" max="2" step="0.1" value="0">
            </div>

            <!-- 随机种子 -->
            <div class="config-item">
                <label class="config-label" data-i18n="config.seed">随机种子</label>
                <input type="number" class="config-input" id="seed" placeholder="可选">
            </div>
        </div>

        <!-- 配置管理按钮 -->
        <div class="config-actions">
            <button class="config-action-btn export-btn" id="exportConfigBtn" title="导出配置">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span style="font-size: 12px" data-i18n="config.export">导出</span>
            </button>
            <button class="config-action-btn import-btn" id="importConfigBtn" title="导入配置">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span style="font-size: 12px" data-i18n="config.import">导入</span>
            </button>
            <button class="config-action-btn reset-btn" id="resetConfigBtn" title="重置配置">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                    <path d="M3 21v-5h5"/>
                </svg>
                <span style="font-size: 12px" data-i18n="config.reset">重置</span>
            </button>
        </div>
    </div>

    <!-- 2. 底部：历史记录 (40%) -->
    <div class="sidebar-history">
        <div class="section-label-with-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            <span data-i18n="sidebar.history">历史记录</span>
        </div>
        <div id="historyList"></div>
        <div class="placeholder-text" id="historyPlaceholder" data-i18n="sidebar.no_history">暂无对话记录</div>
    </div>

</aside>

<!-- 右侧主体 -->
<main class="main-content">
    <h1 class="brand-logo">Turing Intelligent Computing</h1>

    <!-- 聊天对话区域 -->
    <div id="chatArea" class="chat-area" style="display: none;"></div>

    <!-- 聊天输入框 -->
    <div class="input-container">
        <input type="text" data-i18n-placeholder="main.input_placeholder" placeholder="输入您的问题..." id="chatInput">

        <!-- 发送按钮 -->
        <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>

    <p class="subtitle" data-i18n="main.subtitle">国内外 AI api 智能聚合平台，众多合作模型供您选择</p>

    <!-- 合作平台图标 -->
    <div class="platform-area" id="platformArea">
        <!-- 动态加载供应商图标 -->
    </div>
</main>
</div>

<!-- 引入 JavaScript -->
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/providers.js"></script>
<script src="js/index.js"></script>
</body>
</html>
