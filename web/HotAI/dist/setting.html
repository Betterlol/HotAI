<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title>控制台 - 系统设置</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/console-shared.css">
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo"><img src="picture/logo.png" alt="图灵智算" style="width:36px;height:36px;object-fit:contain;">图灵智算</a>
        <div class="nav-links"><a href="index.html">首页</a><a href="console.html" class="active">控制台</a><a href="model.html">模型广场</a><a href="docs.html">文档</a><a href="about.html">关于</a></div>
    </div>
    <div class="nav-right">
        <button class="icon-btn" id="noticeBtn" title="公告"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
        <div class="language-selector"><button class="icon-btn" id="languageBtn" title="语言"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button><div class="language-dropdown" id="languageDropdown"><div class="language-option" data-lang="zh"><span>中文</span></div><div class="language-option" data-lang="en"><span>English</span></div></div></div>
        <a href="login.html" class="btn-login" id="navLoginBtn">登录</a><a href="register.html" class="btn-signup" id="navSignupBtn">注册</a>
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger"><div class="user-avatar-top" id="navUserAvatar">U</div><span id="navUsername">User</span></div>
            <div class="user-dropdown" id="navUserDropdown"><a href="profile.html" class="user-dropdown-item">个人设置</a><div class="user-dropdown-divider"></div><button id="navLogoutBtn" class="user-dropdown-item">退出登录</button></div>
        </div>
    </div>
</header>
<div class="notice-modal" id="noticeModal" style="display:none;"><div class="notice-overlay" id="noticeOverlay"></div><div class="notice-card"><div class="notice-header"><h3>公告</h3><button class="notice-close" id="noticeClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><div class="notice-content" id="noticeContent"><div class="notice-loading">加载中...</div></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-header">
            <div class="page-title">系统设置</div>
            <div class="page-actions"><button class="btn btn-primary" onclick="saveAllSettings()">保存全部设置</button></div>
        </div>

        <div class="settings-grid">
            <!-- 基础设置 -->
            <div class="setting-card">
                <div class="setting-card-header"><h3>基础设置</h3><p>配置系统基本信息和行为</p></div>
                <div class="setting-card-body">
                    <div class="form-group"><label class="form-label">系统名称</label><input type="text" class="form-input" id="systemName" placeholder="图灵智算"></div>
                    <div class="form-group"><label class="form-label">Logo URL</label><input type="text" class="form-input" id="logoUrl" placeholder="/logo.png"></div>
                    <div class="form-group"><label class="form-label">首页内容</label><textarea class="form-textarea" id="homeContent" rows="3" placeholder="首页展示内容"></textarea></div>
                    <div class="form-group"><label class="form-label">页脚内容</label><input type="text" class="form-input" id="footerHtml" placeholder="页脚HTML"></div>
                </div>
            </div>

            <!-- 注册设置 -->
            <div class="setting-card">
                <div class="setting-card-header"><h3>注册与登录</h3><p>控制用户注册和登录行为</p></div>
                <div class="setting-card-body">
                    <div class="form-group"><label class="form-switch"><input type="checkbox" class="switch-input" id="registerEnabled"><span class="switch-track"></span><span class="switch-label">允许新用户注册</span></label></div>
                    <div class="form-group"><label class="form-switch"><input type="checkbox" class="switch-input" id="emailVerificationEnabled"><span class="switch-track"></span><span class="switch-label">注册需邮箱验证</span></label></div>
                    <div class="form-group"><label class="form-label">新用户初始额度</label><input type="number" class="form-input" id="newUserQuota" value="500000"></div>
                    <div class="form-group"><label class="form-label">新用户分组</label><input type="text" class="form-input" id="newUserGroup" value="default"></div>
                </div>
            </div>

            <!-- 充值设置 -->
            <div class="setting-card">
                <div class="setting-card-header"><h3>充值配置</h3><p>在线充值和支付设置</p></div>
                <div class="setting-card-body">
                    <div class="form-group"><label class="form-switch"><input type="checkbox" class="switch-input" id="topupEnabled"><span class="switch-track"></span><span class="switch-label">启用在线充值</span></label></div>
                    <div class="form-group"><label class="form-label">最小充值金额</label><input type="number" class="form-input" id="minTopup" value="1" step="0.01"></div>
                    <div class="form-group"><label class="form-label">充值汇率</label><input type="number" class="form-input" id="topupRatio" value="15" step="0.1"><div class="hint-text">1 RMB = ? quota (500000 quota = $1)</div></div>
                </div>
            </div>

            <!-- 日志设置 -->
            <div class="setting-card">
                <div class="setting-card-header"><h3>日志配置</h3><p>控制日志记录行为</p></div>
                <div class="setting-card-body">
                    <div class="form-group"><label class="form-switch"><input type="checkbox" class="switch-input" id="logEnabled"><span class="switch-track"></span><span class="switch-label">启用日志记录</span></label></div>
                    <div class="form-group"><label class="form-label">日志保留天数</label><input type="number" class="form-input" id="logRetentionDays" value="30"></div>
                </div>
            </div>

            <!-- 监控设置 -->
            <div class="setting-card">
                <div class="setting-card-header"><h3>监控配置</h3><p>Uptime Kuma 监控集成</p></div>
                <div class="setting-card-body">
                    <div class="form-group"><label class="form-switch"><input type="checkbox" class="switch-input" id="monitorEnabled"><span class="switch-track"></span><span class="switch-label">启用监控</span></label></div>
                    <div class="form-group"><label class="form-label">Uptime Kuma URL</label><input type="text" class="form-input" id="uptimeKumaUrl" placeholder="https://status.example.com"></div>
                </div>
            </div>

            <!-- SMTP 设置 -->
            <div class="setting-card">
                <div class="setting-card-header"><h3>邮件配置</h3><p>SMTP 服务器设置</p></div>
                <div class="setting-card-body">
                    <div class="form-group"><label class="form-label">SMTP 服务器</label><input type="text" class="form-input" id="smtpServer" placeholder="smtp.example.com"></div>
                    <div class="form-group"><label class="form-label">SMTP 端口</label><input type="number" class="form-input" id="smtpPort" value="587"></div>
                    <div class="form-group"><label class="form-label">发件人地址</label><input type="email" class="form-input" id="smtpFrom" placeholder="no-reply@example.com"></div>
                    <div class="form-group"><label class="form-label">SMTP 用户名</label><input type="text" class="form-input" id="smtpUsername"></div>
                    <div class="form-group"><label class="form-label">SMTP 密码</label><input type="password" class="form-input" id="smtpPassword"></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/setting.js"></script>
</body>
</html>
