<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title>控制台 - 兑换码管理</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/console-shared.css">
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo"><img src="picture/logo.png" alt="图灵智算" style="width:36px;height:36px;object-fit:contain;">图灵智算</a>
        <div class="nav-links"><a href="index.html">首页</a><a href="console.html" class="active">控制台</a><a href="model.html">模型广场</a><a href="docs.html">文档</a><a href="about.html">关于</a></div>
    </div>
    <div class="nav-right">
        <button class="icon-btn" id="noticeBtn" title="公告"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
        <div class="language-selector"><button class="icon-btn" id="languageBtn" title="语言"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button><div class="language-dropdown" id="languageDropdown"><div class="language-option" data-lang="zh"><span>中文</span></div><div class="language-option" data-lang="en"><span>English</span></div></div></div>
        <a href="login.html" class="btn-login" id="navLoginBtn">登录</a><a href="register.html" class="btn-signup" id="navSignupBtn">注册</a>
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger"><div class="user-avatar-top" id="navUserAvatar">U</div><span id="navUsername">User</span></div>
            <div class="user-dropdown" id="navUserDropdown">
                <a href="profile.html" class="user-dropdown-item">个人设置</a>
                <div class="user-dropdown-divider"></div>
                <button id="navLogoutBtn" class="user-dropdown-item">退出登录</button>
            </div>
        </div>
    </div>
</header>
<div class="notice-modal" id="noticeModal" style="display:none;"><div class="notice-overlay" id="noticeOverlay"></div><div class="notice-card"><div class="notice-header"><h3>公告</h3><button class="notice-close" id="noticeClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><div class="notice-content" id="noticeContent"><div class="notice-loading">加载中...</div></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<!-- 创建兑换码模态框 -->
<div class="modal-overlay hidden" id="rdModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="rdModalTitle">创建兑换码</div>
            <button class="modal-close" onclick="closeRdModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="rdId">
            <div class="form-group"><label class="form-label">名称 <span>*</span></label><input type="text" class="form-input" id="rdName" placeholder="兑换码名称"></div>
            <div class="form-group"><label class="form-label">额度 <span>*</span></label><input type="number" class="form-input" id="rdQuota" placeholder="单位：$0.002 = 1000quota" value="500000"></div>
            <div class="form-group"><label class="form-label">生成数量</label><input type="number" class="form-input" id="rdCount" value="1" min="1" max="1000" placeholder="1-1000"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeRdModal()">取消</button>
            <button class="btn btn-primary" onclick="saveRd()">生成</button>
        </div>
    </div>
</div>

<div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-header">
            <div class="page-title">兑换码管理</div>
            <div class="page-actions" style="display:flex;gap:8px;">
                <button class="btn btn-secondary" onclick="exportRds()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    导出
                </button>
                <button class="btn btn-danger" onclick="deleteInvalidRd()">清理无效码</button>
                <button class="btn btn-secondary" id="copySelectedBtn" onclick="copySelectedRds()" disabled>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    复制所选兑换码
                </button>
                <button class="btn btn-primary" onclick="openCreateRdModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    生成兑换码
                </button>
            </div>
        </div>
        <div class="table-card">
            <!-- 批量操作工具栏 -->
            <div id="rdBatchBar" style="display:none;align-items:center;gap:12px;padding:10px 16px;background:var(--c-primary-light,#eff6ff);border-bottom:1px solid var(--c-border);">
                <span style="font-size:13px;color:var(--c-primary);font-weight:500;">已选 <strong id="rdSelectedCount">0</strong> 项</span>
                <button class="btn btn-secondary btn-sm" onclick="copySelectedRds()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    复制所选
                </button>
                <button class="btn btn-danger btn-sm" onclick="batchDeleteRds()">批量删除</button>
                <button class="btn btn-secondary btn-sm" onclick="selectedRds.clear();updateRdBatchBar();document.querySelectorAll('.rd-checkbox').forEach(c=>c.checked=false)">取消选择</button>
            </div>
            <div class="table-toolbar">
                <div class="table-toolbar-left">
                    <div class="search-input-wrap">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
                        <input type="text" class="search-input" id="rdSearch" placeholder="搜索兑换码名称...">
                    </div>
                    <select class="form-select" id="rdSortField" onchange="loadRd()" style="width:150px;margin-left:12px;">
                        <option value="id">ID排序</option>
                        <option value="name">名称排序</option>
                        <option value="created_time">创建时间排序</option>
                    </select>
                    <button class="btn btn-secondary" onclick="toggleRdSortOrder()" style="margin-left:8px;" id="rdSortOrderBtn" title="切换排序">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" id="rdSortIcon">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <polyline points="19 12 12 19 5 12"/>
                        </svg>
                    </button>
                    <button class="btn btn-secondary" onclick="resetRdFilters()" style="margin-left:8px;">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;">
                            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                            <path d="M21 3v5h-5"/>
                            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                            <path d="M3 21v-5h5"/>
                        </svg>
                        重置
                    </button>
                </div>
                <div class="table-toolbar-right"><button class="btn btn-secondary" onclick="loadRd()">刷新</button></div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr>
                        <th style="width:36px;text-align:center;"><input type="checkbox" onchange="toggleSelectAllRds(this.checked)"></th>
                        <th style="text-align:center;">ID</th>
                        <th style="text-align:center;">名称</th>
                        <th style="text-align:center;">状态</th>
                        <th style="text-align:center;">额度</th>
                        <th style="text-align:center;">创建时间</th>
                        <th style="text-align:center;">过期时间</th>
                        <th style="text-align:center;">兑换人ID</th>
                        <th style="text-align:center;">操作</th>
                    </tr></thead>
                    <tbody id="rdTableBody"><tr><td colspan="9"><div class="loading-overlay"><div class="loading-spinner"></div></div></td></tr></tbody>
                </table>
            </div>
            <div class="pagination"><span id="rdPageInfo">共 0 条</span><div class="pagination-pages" id="rdPages"></div></div>
        </div>
    </main>
</div>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/redemption.js"></script>
</body>
</html>
