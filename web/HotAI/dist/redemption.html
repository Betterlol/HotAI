<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <title>兑换码管理 - 控制台</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/console-shared.css">
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo"><img src="picture/logo.png" alt="图灵智算" style="width:36px;height:36px;object-fit:contain;">图灵智算</a>
        <div class="nav-links"><a href="index.html">首页</a><a href="console.html" class="active">控制台</a><a href="model.html">模型广场</a><a href="docs.html">文档</a></div>
    </div>
    <div class="nav-right">
        <button class="icon-btn" id="noticeBtn" title="公告"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
        <div class="language-selector"><button class="icon-btn" id="languageBtn" title="语言"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button><div class="language-dropdown" id="languageDropdown"><div class="language-option" data-lang="zh"><span>中文</span></div><div class="language-option" data-lang="en"><span>English</span></div></div></div>
        <a href="login.html" class="btn-login" id="navLoginBtn">登录</a><a href="register.html" class="btn-signup" id="navSignupBtn">注册</a>
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger"><div class="user-avatar-top" id="navUserAvatar">U</div><span id="navUsername">User</span></div>
            <div class="user-dropdown" id="navUserDropdown">
                <a href="profile.html" class="user-dropdown-item">个人设置</a>
                <div class="user-dropdown-divider"></div>
                <button id="navLogoutBtn" class="user-dropdown-item">退出登录</button>
            </div>
        </div>
    </div>
</header>
<div class="notice-modal" id="noticeModal" style="display:none;"><div class="notice-overlay" id="noticeOverlay"></div><div class="notice-card"><div class="notice-header"><h3>公告</h3><button class="notice-close" id="noticeClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><div class="notice-content" id="noticeContent"><div class="notice-loading">加载中...</div></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<!-- 创建兑换码模态框 -->
<div class="modal-overlay hidden" id="rdModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="rdModalTitle">创建兑换码</div>
            <button class="modal-close" onclick="closeRdModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="rdId">
            <div class="form-group"><label class="form-label">名称 <span>*</span></label><input type="text" class="form-input" id="rdName" placeholder="兑换码名称"></div>
            <div class="form-group"><label class="form-label">额度 <span>*</span></label><input type="number" class="form-input" id="rdQuota" placeholder="单位：$0.002 = 1000quota" value="500000"></div>
            <div class="form-group"><label class="form-label">生成数量</label><input type="number" class="form-input" id="rdCount" value="1" min="1" max="1000" placeholder="1-1000"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeRdModal()">取消</button>
            <button class="btn btn-primary" onclick="saveRd()">生成</button>
        </div>
    </div>
</div>

<div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-header">
            <div class="page-title">兑换码管理</div>
            <div class="page-actions">
                <button class="btn btn-danger" onclick="deleteInvalidRd()">清理无效码</button>
                <button class="btn btn-primary" onclick="openCreateRdModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    生成兑换码
                </button>
            </div>
        </div>
        <div class="table-card">
            <div class="table-toolbar">
                <div class="table-toolbar-left">
                    <div class="search-input-wrap">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
                        <input type="text" class="search-input" id="rdSearch" placeholder="搜索兑换码名称...">
                    </div>
                </div>
                <div class="table-toolbar-right"><button class="btn btn-secondary" onclick="loadRd()">刷新</button></div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>名称</th><th>兑换码</th><th>额度</th><th>状态</th><th>使用者</th><th>使用时间</th><th>操作</th></tr></thead>
                    <tbody id="rdTableBody"><tr><td colspan="7"><div class="loading-overlay"><div class="loading-spinner"></div></div></td></tr></tbody>
                </table>
            </div>
            <div class="pagination"><span id="rdPageInfo">共 0 条</span><div class="pagination-pages" id="rdPages"></div></div>
        </div>
    </main>
</div>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/redemption.js"></script>
</body>
</html>
