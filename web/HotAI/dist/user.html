<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="picture/favicon.ico" />
    <link rel="icon" type="image/png" href="picture/logo.png" />
    <title>控制台 - 用户管理</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/console-shared.css">
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo"><img src="picture/logo.png" alt="图灵智算" style="width:36px;height:36px;object-fit:contain;">图灵智算</a>
        <div class="nav-links"><a href="index.html">首页</a><a href="console.html" class="active">控制台</a><a href="model.html">模型广场</a><a href="docs.html">文档</a><a href="about.html">关于</a></div>
    </div>
    <div class="nav-right">
        <button class="icon-btn" id="noticeBtn" title="公告"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
        <div class="language-selector"><button class="icon-btn" id="languageBtn" title="语言"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button><div class="language-dropdown" id="languageDropdown"><div class="language-option" data-lang="zh"><span>中文</span></div><div class="language-option" data-lang="en"><span>English</span></div></div></div>
        <a href="login.html" class="btn-login" id="navLoginBtn">登录</a><a href="register.html" class="btn-signup" id="navSignupBtn">注册</a>
        <div class="user-menu hidden" id="navUserMenu">
            <div class="user-trigger"><div class="user-avatar-top" id="navUserAvatar">U</div><span id="navUsername">User</span></div>
            <div class="user-dropdown" id="navUserDropdown">
                <a href="profile.html" class="user-dropdown-item">个人设置</a>
                <div class="user-dropdown-divider"></div>
                <button id="navLogoutBtn" class="user-dropdown-item">退出登录</button>
            </div>
        </div>
    </div>
</header>
<div class="notice-modal" id="noticeModal" style="display:none;"><div class="notice-overlay" id="noticeOverlay"></div><div class="notice-card"><div class="notice-header"><h3>公告</h3><button class="notice-close" id="noticeClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><div class="notice-content" id="noticeContent"><div class="notice-loading">加载中...</div></div></div></div>
<div class="toast-container" id="toastContainer"></div>

<!-- 编辑用户模态框 -->
<div class="modal-overlay hidden" id="userModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="userModalTitle">编辑用户</div>
            <button class="modal-close" onclick="closeUserModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="userId">
            <div class="form-group"><label class="form-label">用户名</label><input type="text" class="form-input" id="editUsername" readonly></div>
            <div class="form-group"><label class="form-label">显示名称</label><input type="text" class="form-input" id="editDisplayName" placeholder="显示名称"></div>
            <div class="form-group"><label class="form-label">角色</label>
                <select class="form-select" id="editRole">
                    <option value="1">普通用户</option>
                    <option value="10">管理员</option>
                    <option value="100">超级管理员</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">分组</label><input type="text" class="form-input" id="editGroup" placeholder="default"></div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">余额（quota）</label><input type="number" class="form-input" id="editQuota" placeholder="0"></div>
                <div class="form-group"><label class="form-label">新密码（留空不修改）</label><input type="password" class="form-input" id="editPassword" placeholder="新密码"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeUserModal()">取消</button>
            <button class="btn btn-primary" onclick="saveUser()">保存</button>
        </div>
    </div>
</div>

<!-- 充值模态框 -->
<div class="modal-overlay hidden" id="topupModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">手动充值</div>
            <button class="modal-close" onclick="closeTopupModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="topupUserId">
            <div class="form-group"><label class="form-label">用户名</label><input type="text" class="form-input" id="topupUsername" readonly></div>
            <div class="form-group"><label class="form-label">充值额度</label><input type="number" class="form-input" id="topupAmount" placeholder="正数增加，负数减少" value="500000"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeTopupModal()">取消</button>
            <button class="btn btn-primary" onclick="doTopup()">确认充值</button>
        </div>
    </div>
</div>

<div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-header">
            <div class="page-title">用户管理</div>
        </div>
        <div class="table-card">
            <div class="table-toolbar">
                <div class="table-toolbar-left">
                    <div class="search-input-wrap">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
                        <input type="text" class="search-input" id="userSearch" placeholder="搜索用户名或邮箱...">
                    </div>
                </div>
                <div class="table-toolbar-right"><button class="btn btn-secondary" onclick="loadUsers()">刷新</button></div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>ID</th><th>用户名</th><th>显示名称</th><th>角色</th><th>余额</th><th>已用额度</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
                    <tbody id="userTableBody"><tr><td colspan="9"><div class="loading-overlay"><div class="loading-spinner"></div></div></td></tr></tbody>
                </table>
            </div>
            <div class="pagination"><span id="userPageInfo">共 0 条</span><div class="pagination-pages" id="userPages"></div></div>
        </div>
    </main>
</div>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/user.js"></script>
</body>
</html>
